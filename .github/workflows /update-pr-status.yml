name: Update PR Status

on:
  schedule:
    - cron: "*/30 * * * *"   # 每30分钟执行一次
  workflow_dispatch:

jobs:
  update-status:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update PR Status
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let csv = fs.readFileSync('tasks.csv', 'utf8');
            let lines = csv.split('\n').filter(line => line.trim() !== '');

            const header = lines[0];
            let rows = lines.slice(1);

            let updatedRows = [];

            for (let row of rows) {
              let parts = row.split(',');

              // 防御：补齐列
              while (parts.length < 7) parts.push('');

              let issueUrl = parts[2];
              let prUrl = parts[4];
              let status = parts[5];

              if (!prUrl || !prUrl.includes('github.com')) {
                updatedRows.push(parts.join(','));
                continue;
              }

              try {
                // ===== 解析 PR =====
                const match = prUrl.match(/github\.com\/([^\/]+)\/([^\/]+)\/pull\/(\d+)/);
                if (!match) {
                  updatedRows.push(parts.join(','));
                  continue;
                }

                const prOwner = match[1];
                const prRepo = match[2];
                const pull_number = parseInt(match[3]);

                const { data: pr } = await github.rest.pulls.get({
                  owner: prOwner,
                  repo: prRepo,
                  pull_number
                });

                let newStatus = "open";

                // ===== merged =====
                if (pr.merged_at) {
                  newStatus = "merged";

                  // 关闭 Issue
                  const issueMatch = issueUrl.match(/issues\/(\d+)/);
                  if (issueMatch) {
                    const issue_number = parseInt(issueMatch[1]);

                    await github.rest.issues.update({
                      owner,
                      repo,
                      issue_number,
                      state: "closed"
                    });
                  }

                // ===== closed（未合并）=====
                } else if (pr.state === "closed") {
                  newStatus = "closed";

                  const issueMatch = issueUrl.match(/issues\/(\d+)/);
                  if (issueMatch) {
                    const issue_number = parseInt(issueMatch[1]);

                    const { data: issueData } = await github.rest.issues.get({
                      owner,
                      repo,
                      issue_number
                    });

                    let body = issueData.body || "";

                    // 清空 Owner / PR / ClaimedAt
                    body = body
                      .replace(/Owner:.*/g, "")
                      .replace(/PR:.*/g, "")
                      .replace(/ClaimedAt:.*/g, "");

                    await github.rest.issues.update({
                      owner,
                      repo,
                      issue_number,
                      body
                    });

                    // 删除 label
                    try {
                      await github.rest.issues.removeLabel({
                        owner,
                        repo,
                        issue_number,
                        name: 'claimed'
                      });
                    } catch (e) {}
                  }

                // ===== open =====
                } else {
                  newStatus = "open";
                }

                parts[5] = newStatus;

              } catch (e) {
                console.log("Error processing PR:", prUrl);
              }

              updatedRows.push(parts.join(','));
            }

            const newCsv = [header, ...updatedRows].join('\n');
            fs.writeFileSync('tasks.csv', newCsv);

      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add tasks.csv
          git commit -m "update PR status" || echo "no changes"
          git push
