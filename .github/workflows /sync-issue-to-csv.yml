name: Sync Issue to CSV

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  schedule:
    - cron: "*/10 * * * *"   # 每10分钟自动同步一次（兜底）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync Issue to CSV
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ===== 读取 CSV =====
            let csv = fs.readFileSync('tasks.csv', 'utf8');
            let lines = csv.split('\n').filter(line => line.trim() !== '');

            // 表头
            const header = lines[0];
            let rows = lines.slice(1);

            let issues = [];

            // ===== 判断触发方式 =====
            if (!context.payload.issue) {
              const { data } = await github.rest.issues.listForRepo({
                owner,
                repo,
                state: 'open',
                per_page: 100
              });
              issues = data;
            } else {
              issues = [context.payload.issue];
            }

            for (const issue of issues) {
              const title = issue.title;
              const body = issue.body || "";
              const issueNumber = issue.number;

              const issueUrl = `https://github.com/${owner}/${repo}/issues/${issueNumber}`;

              // ===== Repo =====
              const repoMatch = body.match(/https:\/\/github\.com\/[^\s]+/);
              const repoUrl = repoMatch ? repoMatch[0] : "";

              // ===== Owner =====
              const ownerMatch = body.match(/Owner:\s*@([^\s]+)/);
              const taskOwner = ownerMatch ? ownerMatch[1] : "";

              // ===== PR =====
              const prMatch = body.match(/PR:\s*(https:\/\/[^\s]+)/);
              const prUrl = prMatch ? prMatch[1] : "";
              let status = "";
              if (prUrl) {
              // 保留原 status（不动）
              } else {
              status = "";  // 没 PR → 清空状态
              }

              if (!repoUrl) continue;

              let found = false;

              rows = rows.map(row => {
                let parts = row.split(',');

                // 防御：列数不足补齐
                while (parts.length < 7) parts.push('');

                // Project,Repo,Issue,Owner,PR,Status,Source
                // 优先用 Issue 匹配，其次用 Repo 匹配
                if (parts[2] === issueUrl || (parts[2] === "" && parts[1] === repoUrl)) {
                parts[2] = issueUrl;     // 自动补上 Issue
                parts[3] = taskOwner;
                parts[4] = prUrl;
                
                // ⭐ 关键：PR 为空就清 Status
                if (!prUrl) {
                  parts[5] = "";
                }
                found = true;
                } {
                  parts[3] = taskOwner;
                  parts[4] = prUrl;
                  found = true;
                }

                return parts.join(',');
              });

              // ===== 不存在就新增 =====
              if (!found) {
                const project = title.replace("[Task]", "").trim();
                const newRow = [
                  project,
                  repoUrl,
                  issueUrl,
                  taskOwner,
                  prUrl,
                  "",
                  "community"
                ].join(',');

                rows.push(newRow);
              }
            }

            // ===== 写回 CSV =====
            const newCsv = [header, ...rows].join('\n');
            fs.writeFileSync('tasks.csv', newCsv);

      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add tasks.csv
          git commit -m "sync issue to csv" || echo "no changes"
          git push
