name: Update README (Artifact Only)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ 安装依赖
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      # 4️⃣ 生成 README
      - name: Run script
        run: python scripts/update_readme.py

      # 5️⃣ 展示（debug）
      - name: Show README
        run: cat README.md

      # 6️⃣ 上传 README
      - name: Upload README artifact
        uses: actions/upload-artifact@v4
        with:
          name: updated-readme
          path: README.md
