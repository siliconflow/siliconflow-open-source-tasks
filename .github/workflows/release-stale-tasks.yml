name: Release Stale Tasks

on:
  schedule:
    - cron: "0 2 * * *"   # 每天执行一次
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check stale tasks
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const now = new Date();

            for (const issue of issues) {
              const body = issue.body || "";

              // 必须有 Owner 和时间
              const ownerMatch = body.match(/Owner:\s*@([^\s]+)/);
              const timeMatch = body.match(/ClaimedAt:\s*([0-9\-]+)/);
              const prMatch = body.match(/PR:\s*(https:\/\/[^\s]+)/);

              if (!ownerMatch || !timeMatch) continue;

              // 判断 PR 状态，判断释放条件
              if (prMatch) {
                const prUrl = prMatch[1];
                
                // 调 GitHub API 查 PR 状态
                // 如果 merged → continue
                // 如果 open/closed → 仍然允许释放
                }

              const claimedDate = new Date(timeMatch[1]);
              const diffDays = (now - claimedDate) / (1000 * 60 * 60 * 24);

              if (diffDays > 10) {
                // 清空 Owner + 时间
                let newBody = body
                  .replace(/Owner:.*/g, "")
                  .replace(/ClaimedAt:.*/g, "");

                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: newBody
                });

                // 移除 label
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: issue.number,
                    name: 'claimed'
                  });
                } catch (e) {}

                // 留评论
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: `⏰ 该任务超过10天未提交PR，已自动释放，可重新认领`
                });
              }
            }
