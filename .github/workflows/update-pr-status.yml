name: Update PR Status

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  update-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update PR Status
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let csv = fs.existsSync('tasks.csv')
              ? fs.readFileSync('tasks.csv', 'utf8')
              : "Project,Repo,Issue,Owner,PR,Status,Source\n";

            let lines = csv.split('\n').filter(line => line.trim() !== '');

            const header = lines[0];
            let rows = lines.slice(1);

            let updatedRows = [];

            for (let row of rows) {
              let parts = row.split(',');

              while (parts.length < 7) parts.push('');

              let issueUrl = parts[2];
              let prUrl = parts[4];

              if (!prUrl || !prUrl.includes('github.com')) {
                updatedRows.push(parts.join(','));
                continue;
              }

              try {
                const match = prUrl.match(/github\.com\/([^\/]+)\/([^\/]+)\/pull\/(\d+)/);
                if (!match) {
                  updatedRows.push(parts.join(','));
                  continue;
                }

                const prOwner = match[1];
                const prRepo = match[2];
                const pull_number = parseInt(match[3]);

                const { data: pr } = await github.rest.pulls.get({
                  owner: prOwner,
                  repo: prRepo,
                  pull_number
                });

                let newStatus = "open";

                if (pr.merged_at) {
                  newStatus = "merged";

                  const issueMatch = issueUrl.match(/issues\/(\d+)/);
                  if (issueMatch) {
                    const issue_number = parseInt(issueMatch[1]);

                    await github.rest.issues.update({
                      owner,
                      repo,
                      issue_number,
                      state: "closed"
                    });
                  }

                } else if (pr.state === "closed") {
                  newStatus = "closed";

                  const issueMatch = issueUrl.match(/issues\/(\d+)/);
                  if (issueMatch) {
                    const issue_number = parseInt(issueMatch[1]);

                    const { data: issueData } = await github.rest.issues.get({
                      owner,
                      repo,
                      issue_number
                    });

                    let body = issueData.body || "";

                    body = body
                      .replace(/Owner:.*/g, "")
                      .replace(/PR:.*/g, "")
                      .replace(/ClaimedAt:.*/g, "");

                    await github.rest.issues.update({
                      owner,
                      repo,
                      issue_number,
                      body
                    });

                    try {
                      await github.rest.issues.removeLabel({
                        owner,
                        repo,
                        issue_number,
                        name: 'claimed'
                      });
                    } catch (e) {}

                  }

                } else {
                  newStatus = "open";
                }

                parts[5] = newStatus;

              } catch (e) {
                console.log("Error processing PR:", prUrl);
              }

              updatedRows.push(parts.join(','));
            }

            const newCsv = [header, ...updatedRows].join('\n');
            fs.writeFileSync('tasks.csv', newCsv);

      - name: Show CSV
        run: cat tasks.csv

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: tasks-csv-status
          path: tasks.csv

      - name: Done
        run: echo "Read-only mode, CSV uploaded as artifact"
