name: Sync Issue to CSV

on:
  issues:
    types: [opened, edited, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  issues: read
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync Issue to CSV
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const csvPath = 'tasks.csv';
            if (!fs.existsSync(csvPath)) {
              console.log("⚠️ CSV not found, create with header");
              fs.writeFileSync(csvPath, "Project,Repo,Issue,Owner,PR,Status,Source\n");
            }

            let csv = fs.readFileSync(csvPath, 'utf8');
            let lines = csv.split('\n').filter(line => line.trim() !== '');
            const header = lines[0];
            let rows = lines.slice(1);

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ===== 当前触发的 issue =====
            let issues = [];
            if (context.payload.issue) {
              issues = [context.payload.issue];
            } else {
              console.log("⚠️ No issue payload, skip sync to avoid overwriting CSV");
              return;
            }

            for (const issue of issues) {
              const title = issue.title;
              const body = issue.body || "";
              const issueNumber = issue.number;
              const issueUrl = `https://github.com/${owner}/${repo}/issues/${issueNumber}`;

              // ===== Repo =====
              const repoMatch = body.match(/https:\/\/github\.com\/[^\s)\n]+/);
              const repoUrl = repoMatch ? repoMatch[0] : null;
              if (!repoUrl) {
                console.log(`⚠️ Skip issue ${issueUrl}: no valid repo URL`);
                continue;
              }

              // ===== Owner =====
              const ownerMatch = body.match(/Owner:\s*@([^\s]+)/);
              const taskOwner = ownerMatch ? ownerMatch[1] : "";

              // ===== PR =====
              const prMatch = body.match(/PR:\s*(https:\/\/[^\s]+)/);
              const prUrl = prMatch ? prMatch[1] : "";

              // ===== Status =====
              let status = "";
              if (prUrl) {
                const mergedMatch = body.match(/Status:\s*(merged|closed|open)/i);
                status = mergedMatch ? mergedMatch[1].toLowerCase() : "open";
              }

              // ===== Source =====
              let source = "official";
              if (issue.labels.some(l => l.name.toLowerCase() === "proposal")) {
                source = "community";
              }

              let found = false;

              rows = rows.map(row => {
                let parts = row.split(',');
                while (parts.length < 7) parts.push('');

                if (parts[2] === issueUrl || (parts[2] === "" && parts[1] === repoUrl)) {
                  parts[2] = issueUrl;
                  parts[3] = taskOwner;
                  parts[4] = prUrl;
                  parts[5] = status;
                  parts[6] = source;
                  found = true;
                }

                return parts.join(',');
              });

              if (!found) {
                const project = title.replace("[Task]", "").trim();
                const newRow = [
                  project,
                  repoUrl,
                  issueUrl,
                  taskOwner,
                  prUrl,
                  status,
                  source
                ].join(',');
                rows.push(newRow);
              }
            }

            // ===== 写回 CSV（只更新 runner 本地，不 push） =====
            const newCsv = [header, ...rows].join('\n');
            fs.writeFileSync(csvPath, newCsv);
            console.log("✅ CSV updated locally");

      - name: Upload CSV Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tasks-csv
          path: tasks.csv
