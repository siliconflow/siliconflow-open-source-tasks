name: Sync Issue to CSV

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

# ✅ 关键：声明权限（否则 403）
permissions:
  issues: read
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ 同步逻辑
      - name: Sync Issue to CSV
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ===== 读取 CSV =====
            let csv = fs.readFileSync('tasks.csv', 'utf8');
            let lines = csv.split('\n').filter(line => line.trim() !== '');

            const header = lines[0];
            let rows = lines.slice(1);

            let issues = [];

            // ✅ 只处理当前 issue（避免权限问题）
            if (context.payload.issue) {
              issues = [context.payload.issue];
            } else {
              console.log("Skip full sync due to permission limits");
              return;
            }

            for (const issue of issues) {
              const title = issue.title;
              const body = issue.body || "";
              const issueNumber = issue.number;

              const issueUrl = `https://github.com/${owner}/${repo}/issues/${issueNumber}`;

              // ===== Repo =====
              const repoMatch = body.match(/https:\/\/github\.com\/[^\s]+/);
              const repoUrl = repoMatch ? repoMatch[0] : "";

              // ===== Owner =====
              const ownerMatch = body.match(/Owner:\s*@([^\s]+)/);
              const taskOwner = ownerMatch ? ownerMatch[1] : "";

              // ===== PR =====
              const prMatch = body.match(/PR:\s*(https:\/\/[^\s]+)/);
              const prUrl = prMatch ? prMatch[1] : "";

              if (!repoUrl) {
                console.log("No repo URL found, skip");
                continue;
              }

              let found = false;

              rows = rows.map(row => {
                let parts = row.split(',');

                // 防御：补齐列
                while (parts.length < 7) parts.push('');

                // Project,Repo,Issue,Owner,PR,Status,Source
                if (parts[2] === issueUrl || (parts[2] === "" && parts[1] === repoUrl)) {
                  parts[2] = issueUrl;
                  parts[3] = taskOwner;
                  parts[4] = prUrl;

                  // PR 为空 → 清空状态
                  if (!prUrl) {
                    parts[5] = "";
                  }

                  found = true;
                }

                return parts.join(',');
              });

              // ===== 不存在就新增 =====
              if (!found) {
                const project = title.replace("[Task]", "").trim();

                const newRow = [
                  project,
                  repoUrl,
                  issueUrl,
                  taskOwner,
                  prUrl,
                  "",
                  "community"
                ].join(',');

                rows.push(newRow);
              }
            }

            // ===== 写回 CSV =====
            const newCsv = [header, ...rows].join('\n');
            fs.writeFileSync('tasks.csv', newCsv);

      # 3️⃣ Debug（建议保留）
      - name: Show CSV
        run: |
          echo "===== tasks.csv ====="
          cat tasks.csv

      # 4️⃣ 不 push（避免 403）
      - name: Skip push
        run: echo "Skip push due to read-only permissions"
