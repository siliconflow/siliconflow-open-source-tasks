name: Sync Issues to CSV

on:
  schedule:
    - cron: "*/10 * * * *" # 每10分钟兜底
  workflow_dispatch:

permissions:
  issues: read
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Sync all issues to CSV
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ===== 读取 CSV =====
            let csv = fs.existsSync('tasks.csv') ? fs.readFileSync('tasks.csv', 'utf8') : "Project,Repo,Issue,Owner,PR,Status,Source\n";
            let lines = csv.split('\n').filter(line => line.trim() !== '');
            const header = lines[0];
            let rows = lines.slice(1);

            // ===== 获取所有 open Issue =====
            let issues = [];
            const perPage = 100;
            let page = 1;
            while (true) {
              const { data } = await github.rest.issues.listForRepo({
                owner,
                repo,
                state: 'open',
                per_page: perPage,
                page
              });
              if (!data.length) break;
              issues = issues.concat(data);
              if (data.length < perPage) break;
              page++;
            }

            for (const issue of issues) {
              const title = issue.title;
              const body = issue.body || "";
              const issueNumber = issue.number;
              const issueUrl = `https://github.com/${owner}/${repo}/issues/${issueNumber}`;

              // ===== Repo URL =====
              const repoMatch = body.match(/https:\/\/github\.com\/[^\s]+/);
              const repoUrl = repoMatch ? repoMatch[0] : "";
              if (!repoUrl) continue;

              // ===== Owner =====
              const ownerMatch = body.match(/Owner:\s*@([^\s]+)/);
              const taskOwner = ownerMatch ? ownerMatch[1] : "";

              // ===== PR =====
              const prMatch = body.match(/PR:\s*(https:\/\/[^\s]+)/);
              const prUrl = prMatch ? prMatch[1] : "";

              // ===== Status =====
              let status = "";
              if (prUrl) {
                const mergedMatch = body.match(/Status:\s*(merged|closed|open)/i);
                status = mergedMatch ? mergedMatch[1].toLowerCase() : "open";
              }

              let found = false;
              rows = rows.map(row => {
                let parts = row.split(',');
                while (parts.length < 7) parts.push('');

                if (parts[2] === issueUrl || (parts[2] === "" && parts[1] === repoUrl)) {
                  parts[2] = issueUrl;
                  parts[3] = taskOwner;
                  parts[4] = prUrl;
                  parts[5] = status;
                  found = true;
                }
                return parts.join(',');
              });

              if (!found) {
                const project = title.replace("[Task]", "").trim();
                const newRow = [
                  project,
                  repoUrl,
                  issueUrl,
                  taskOwner,
                  prUrl,
                  status,
                  "community"
                ].join(',');
                rows.push(newRow);
              }
            }

            // ===== 写回 CSV =====
            const newCsv = [header, ...rows].join('\n');
            fs.writeFileSync('tasks.csv', newCsv);

      - name: Show CSV (Debug)
        run: cat tasks.csv

      - name: Create PR with updated CSV
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "sync issues to csv"
          branch: "sync-issue-to-csv"
          title: "Sync Issues to CSV"
          body: "Automated CSV update from issues"
          base: main
          # path 可以省略，提交整个工作树，避免 ENOTDIR
