name: Sync Issue to CSV

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync Issue to CSV
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let csv = fs.readFileSync('tasks.csv', 'utf8');
            let lines = csv.split('\n').filter(line => line.trim() !== '');

            const header = lines[0];
            let rows = lines.slice(1);

            let issues = [];

            // ===== 获取 issue =====
            if (!context.payload.issue) {
              const { data } = await github.rest.issues.listForRepo({
                owner,
                repo,
                state: 'open',
                per_page: 100
              });
              issues = data;
            } else {
              issues = [context.payload.issue];
            }

            for (const issue of issues) {
              const title = issue.title;
              const body = issue.body || "";
              const issueNumber = issue.number;

              const issueUrl = `https://github.com/${owner}/${repo}/issues/${issueNumber}`;

              // Repo
              const repoMatch = body.match(/https:\/\/github\.com\/[^\s]+/);
              const repoUrl = repoMatch ? repoMatch[0] : "";

              // Owner
              const ownerMatch = body.match(/Owner:\s*@([^\s]+)/);
              const taskOwner = ownerMatch ? ownerMatch[1] : "";

              // PR
              const prMatch = body.match(/PR:\s*(https:\/\/[^\s]+)/);
              const prUrl = prMatch ? prMatch[1] : "";

              if (!repoUrl) continue;

              let found = false;

              rows = rows.map(row => {
                let parts = row.split(',');

                while (parts.length < 7) parts.push('');

                if (parts[2] === issueUrl || (parts[2] === "" && parts[1] === repoUrl)) {

                  parts[2] = issueUrl;
                  parts[3] = taskOwner;

                  // ✅ 不覆盖已有 PR（除非 issue 有新 PR）
                  if (prUrl) {
                    parts[4] = prUrl;
                  }

                  // PR 为空才清 status
                  if (!prUrl) {
                    parts[5] = "";
                  }

                  found = true;
                }

                return parts.join(',');
              });

              // 不存在就新增
              if (!found) {
                const project = title.replace("[Task]", "").trim();

                const newRow = [
                  project,
                  repoUrl,
                  issueUrl,
                  taskOwner,
                  prUrl,
                  "",
                  "community"
                ].join(',');

                rows.push(newRow);
              }
            }

            const newCsv = [header, ...rows].join('\n');
            fs.writeFileSync('tasks.csv', newCsv);

      - name: Commit changes (safe)
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add tasks.csv

          if ! git diff --cached --quiet; then
            git commit -m "sync issue to csv"
            echo "Changes committed"
          else
            echo "No changes"
          fi

          # ⚠️ 不 push（避免权限问题）
          echo "Skip push due to permission limitation"
