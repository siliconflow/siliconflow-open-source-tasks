name: Sync Issue to CSV

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  schedule:
    - cron: "*/10 * * * *" # 每10分钟兜底
  workflow_dispatch:

permissions:
  issues: read
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync Issue to CSV
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ===== 读取 CSV =====
            let csv = fs.readFileSync('tasks.csv', 'utf8');
            let lines = csv.split('\n').filter(line => line.trim() !== '');
            const header = lines[0];
            let rows = lines.slice(1);

            // ===== 当前触发的 issue =====
            let issues = [];
            if (context.payload.issue) {
              issues = [context.payload.issue];
            } else {
              console.log("Skip full sync due to permission limits");
              return;
            }

            for (const issue of issues) {
              const title = issue.title;
              const body = issue.body || "";
              const issueNumber = issue.number;
              const issueUrl = `https://github.com/${owner}/${repo}/issues/${issueNumber}`;

              // ===== Repo =====
              const repoMatch = body.match(/https:\/\/github\.com\/[^\s]+/);
              const repoUrl = repoMatch ? repoMatch[0] : "";
              if (!repoUrl) continue; // 必须有 repo

              // ===== Owner =====
              const ownerMatch = body.match(/Owner:\s*@([^\s]+)/);
              const taskOwner = ownerMatch ? ownerMatch[1] : "";

              // ===== PR =====
              const prMatch = body.match(/PR:\s*(https:\/\/[^\s]+)/);
              const prUrl = prMatch ? prMatch[1] : "";

              // ===== Status =====
              let status = "";
              if (prUrl) {
                // 默认 open，如果 merged/closed 信息在 body 可解析，这里简单占位
                const mergedMatch = body.match(/Status:\s*(merged|closed|open)/i);
                status = mergedMatch ? mergedMatch[1].toLowerCase() : "open";
              } else {
                status = "";
              }

              let found = false;

              rows = rows.map(row => {
                let parts = row.split(',');
                while (parts.length < 7) parts.push('');

                // Project,Repo,Issue,Owner,PR,Status,Source
                if (parts[2] === issueUrl || (parts[2] === "" && parts[1] === repoUrl)) {
                  parts[2] = issueUrl;
                  parts[3] = taskOwner;
                  parts[4] = prUrl;
                  parts[5] = status;
                  found = true;
                }

                return parts.join(',');
              });

              // ===== 不存在就新增 =====
              if (!found) {
                const project = title.replace("[Task]", "").trim();
                const newRow = [
                  project,
                  repoUrl,
                  issueUrl,
                  taskOwner,
                  prUrl,
                  status,
                  "community"
                ].join(',');
                rows.push(newRow);
              }
            }

            // ===== 写回 CSV（临时环境） =====
            const newCsv = [header, ...rows].join('\n');
            fs.writeFileSync('tasks.csv', newCsv);

      - name: Show CSV (Debug)
        run: cat tasks.csv

      - name: Skip push
        run: echo "No write permission, CSV changes are local to runner"
